<body class="bg-slate-950 text-slate-50 selection:bg-orange-500/30 selection:text-orange-100 antialiased">
  <div id="root"></div>

  <!-- React App Logic -->
  <script type="text/babel" data-type="module">
    import React, { useState, useEffect, useRef } from 'react';
    import { createRoot } from 'react-dom/client';
    import Papa from 'papaparse';
    import {
      Mail, Calendar, ChevronRight, CheckCircle2, XCircle,
      MessageSquare, FileText, ArrowRight, Star, Quote,
      UserCircle, Linkedin, Instagram, Facebook, MessageCircle
    } from 'lucide-react';

    const MaxSite = () => {
      const [activeTab, setActiveTab] = useState('brand');

      // 自動緩滾：閒置一段時間後自動往下捲動，到底後跳下一頁
      const tabOrder = ['brand', 'services', 'blog', 'reviews', 'contact'];
      const activeTabRef = useRef(activeTab);
      useEffect(() => { activeTabRef.current = activeTab; }, [activeTab]);

      useEffect(() => {
        let idleTimer = null;
        let scrollInterval = null;
        let isAutoScrolling = false;
        const IDLE_DELAY = 5000;
        const SCROLL_SPEED = 1.2;
        const SCROLL_TICK = 30;

        const startAutoScroll = () => {
          if (scrollInterval) return;
          isAutoScrolling = true;
          scrollInterval = setInterval(() => {
            const maxScroll = document.documentElement.scrollHeight - window.innerHeight;
            if (window.scrollY >= maxScroll - 1) {
              stopAutoScroll();
              // 跳到下一個頁面
              const currentIdx = tabOrder.indexOf(activeTabRef.current);
              const nextIdx = (currentIdx + 1) % tabOrder.length;
              setActiveTab(tabOrder[nextIdx]);
              window.scrollTo({ top: 0 });
              // 等待後繼續捲動
              idleTimer = setTimeout(startAutoScroll, IDLE_DELAY);
              return;
            }
            window.scrollBy(0, SCROLL_SPEED);
          }, SCROLL_TICK);
        };

        const stopAutoScroll = () => {
          isAutoScrolling = false;
          if (scrollInterval) {
            clearInterval(scrollInterval);
            scrollInterval = null;
          }
        };

        const resetIdleTimer = (e) => {
          if (e && e.type === 'scroll' && isAutoScrolling) return;
          stopAutoScroll();
          clearTimeout(idleTimer);
          idleTimer = setTimeout(startAutoScroll, IDLE_DELAY);
        };

        const userEvents = ['mousemove', 'mousedown', 'touchstart', 'keydown', 'wheel'];
        userEvents.forEach(e => window.addEventListener(e, resetIdleTimer, { passive: true }));
        window.addEventListener('scroll', resetIdleTimer, { passive: true });

        idleTimer = setTimeout(startAutoScroll, IDLE_DELAY);

        return () => {
          clearTimeout(idleTimer);
          stopAutoScroll();
          userEvents.forEach(e => window.removeEventListener(e, resetIdleTimer));
          window.removeEventListener('scroll', resetIdleTimer);
        };
      }, []);

      const initialReviews = [
        { id: 1, name: "陳小姐", tag: "28歲 / 行銷企劃", stars: 5, comment: "原本對職涯方向很模糊，跟 Max 聊完 30 分鐘後，他幫我把雜亂的選項拆解得很清楚，終於知道下一步該往哪裡走。推薦給同樣卡住的人！", date: "2024-05-15" },
        { id: 2, name: "林先生", tag: "32歲 / 工程師", stars: 5, comment: "服務雖然理性，但能感受到 Max 的溫暖。履歷優化服務非常專業，把我的經驗翻譯成企業聽得懂的語言，面試機會明顯變多了。", date: "2024-05-10" },
        { id: 3, name: "張先生", tag: "25歲 / 社會新鮮人", stars: 4, comment: "$99 的 Email 診斷雖然短，但一針見血地指出我情緒卡住的原因。是一個性價比極高的心靈修復入門票。", date: "2024-05-01" },
      ];

      const [reviews, setReviews] = useState(initialReviews);
      const [isLoadingReviews, setIsLoadingReviews] = useState(true);

      // ⚠️ 請在此處填入你 Google Sheet 發佈為 CSV 的連結 (這是【使用者好評】的專屬連結)
      const GOOGLE_SHEETS_CSV_URL = "https://docs.google.com/spreadsheets/d/e/2PACX-1vQ07qkSZZf7assEOvLdlzkmM8ylFmaFP38jnqaNjajvFH4vr-5b2GwJY1XmoUwMcuIq6ak5PU3XavqZ/pub?output=csv";

      useEffect(() => {
        if (!GOOGLE_SHEETS_CSV_URL) {
          setIsLoadingReviews(false);
          return;
        }
        fetch(GOOGLE_SHEETS_CSV_URL)
          .then(res => res.text())
          .then(csvText => {
            const parsed = Papa.parse(csvText, { header: true, skipEmptyLines: true });
            const approvedReviews = parsed.data
              .filter(row => {
                const appKey = Object.keys(row).find(k => k.toLowerCase().includes('approved') || k.includes('核准')) || 'Approved';
                const val = String(row[appKey] || '').trim().toLowerCase();
                return val === 'true' || val === 'yes' || val === '是' || val === 'v' || val === 'y';
              })
              .map((row, index) => {
                const keys = Object.keys(row);
                const nameKey = keys.find(k => k.toLowerCase().includes('name') || k.includes('名稱')) || keys[1];
                const tagKey = keys.find(k => k.toLowerCase().includes('tag') || k.includes('標籤')) || keys[2];
                const commentKey = keys.find(k => k.toLowerCase().includes('comment') || k.includes('評價')) || keys[3];
                const starsKey = keys.find(k => k.toLowerCase().includes('star') || k.includes('星')) || keys[4];

                return {
                  id: `gs-${index}`,
                  name: row[nameKey] || '匿名訪客',
                  tag: row[tagKey] || '使用者',
                  stars: parseInt(row[starsKey]) || 5,
                  comment: row[commentKey] || '',
                  date: row['時間戳記'] || row.Date || new Date().toISOString().split('T')[0]
                };
              })
              .reverse();
            if (approvedReviews.length > 0) {
              setReviews(approvedReviews);
            }
            setIsLoadingReviews(false);
          })
          .catch(err => {
            console.error("載入評論失敗:", err);
            setIsLoadingReviews(false);
          });
      }, []);

      // 導覽列組件 (深色版)
      const Navbar = () => (
        <nav className="fixed top-0 left-0 right-0 z-50 bg-slate-950/80 backdrop-blur-xl border-b border-white/5">
          <div className="max-w-6xl mx-auto px-6 py-4 flex justify-between items-center">
            <div className="flex items-center space-x-2 relative group cursor-pointer" onClick={() => { setActiveTab('brand'); window.scrollTo({ top: 0, behavior: 'smooth' }); }}>
              <div className="absolute -inset-2 bg-orange-500/20 rounded-full blur-lg opacity-0 group-hover:opacity-100 transition duration-500"></div>
              <span className="text-xl font-extrabold tracking-tighter text-white relative z-10">Maxupport</span>
              <span className="text-sm text-slate-500 font-light relative z-10 hidden sm:inline-block">| 生涯擺渡人 Max</span>
            </div>
            <div className="hidden md:flex items-center space-x-8 text-sm font-medium text-slate-400">
              {[
                { id: 'brand', label: '品牌簡介' },
                { id: 'services', label: '服務說明' },
                { id: 'blog', label: '深度文章' },
                { id: 'reviews', label: '使用者好評' },
              ].map(tab => (
                <button key={tab.id} onClick={() => setActiveTab(tab.id)} className={`hover:text-orange-400 transition-colors duration-300 relative ${activeTab === tab.id ? 'text-orange-400' : ''}`}>
                  {tab.label}
                  {activeTab === tab.id && <span className="absolute -bottom-5 left-0 right-0 h-0.5 bg-orange-500 rounded-t-full shadow-[0_0_10px_rgba(249,115,22,0.8)]"></span>}
                </button>
              ))}
              <button onClick={() => setActiveTab('contact')} className={`bg-white text-slate-950 px-5 py-2.5 rounded-full hover:bg-slate-200 transition-all duration-300 text-xs flex items-center shadow-lg hover:shadow-xl ${activeTab === 'contact' ? 'ring-2 ring-orange-500 ring-offset-2 ring-offset-slate-950' : ''}`}>
                <MessageSquare size={14} className="mr-1.5" /> 聯絡 Max
              </button>
            </div>
          </div>
        </nav>
      );

      // 1. 品牌簡介頁面
      const BrandPage = () => (
        <div className="animate-in fade-in duration-700 pb-20">
          {/* Hero Section */}
          <section className="py-32 px-6 text-center relative overflow-hidden">
            <div className="absolute top-1/2 left-1/2 -translate-x-1/2 -translate-y-1/2 w-[600px] h-[600px] bg-orange-500/10 blur-[120px] rounded-full point-events-none"></div>
            <div className="absolute top-0 right-0 w-[400px] h-[400px] bg-blue-500/5 blur-[100px] rounded-full point-events-none"></div>

            <div className="relative z-10">
              <span className="inline-block py-1 px-3 rounded-full bg-orange-500/10 border border-orange-500/20 text-orange-400 text-xs font-semibold tracking-widest mb-6">MAXUPPORT</span>
              <h1 className="text-4xl md:text-6xl font-extrabold text-white mb-6 leading-tight max-w-4xl mx-auto tracking-tight drop-shadow-sm">
                你不是不夠努力，<br />
                <span className="text-transparent bg-clip-text bg-gradient-to-r from-orange-400 to-orange-600">只是在某些地方過度用力了</span>
              </h1>
              <p className="text-lg md:text-xl text-slate-400 max-w-2xl mx-auto mb-10 leading-relaxed font-light">
                如果你現在處於「選擇很多卻無法下決定」、「一直想往前卻停滯不前」或是「找不到自己的優勢路線」的情況，Maxupport 擺渡服務將幫你梳理現在眼前的混亂，並打開你對於自己未來的期待！
              </p>
              <button onClick={() => setActiveTab('contact')} className="group bg-orange-500 text-white px-8 py-4 rounded-full font-bold hover:bg-orange-400 transition-all duration-300 shadow-[0_0_30px_rgba(249,115,22,0.25)] hover:shadow-[0_0_40px_rgba(249,115,22,0.4)] hover:-translate-y-1 inline-flex items-center">
                預約 30 分鐘，把問題講清楚 <ChevronRight className="ml-2 group-hover:translate-x-1 transition-transform" size={20} />
              </button>
            </div>
          </section>

          {/* Philosophy Section */}
          <section className="py-20 px-6 max-w-5xl mx-auto relative z-10">
            <div className="grid md:grid-cols-2 gap-12 items-center">
              <div className="space-y-8">
                <div>
                  <h2 className="text-3xl font-bold text-white mb-4 tracking-tight">「生涯擺渡」能解決的核心問題</h2>
                  <p className="text-slate-400 font-light leading-relaxed text-lg">
                    我無法教你怎麼立即成功，但我可以引導你找出梳理眼前的混亂的關鍵步驟與方向，讓改變開始發生。
                  </p>
                </div>
                <div className="space-y-4 bg-slate-900/50 p-8 rounded-3xl border border-white/5 backdrop-blur-md shadow-2xl">
                  {[
                    { t: "問題講清楚", d: "不要一直想，而是學會多角度檢視" },
                    { t: "選項攤開", d: "客觀為選項評分，讓「決定」變簡單" },
                    { t: "下一步定出來", d: "在不確定的情況下仍敢於行動" },
                  ].map(item => (
                    <div key={item.t} className="flex items-start space-x-4">
                      <div className="bg-emerald-500/10 p-1.5 rounded-full shrink-0">
                        <CheckCircle2 className="text-emerald-400" size={18} />
                      </div>
                      <div className="mt-1"><span className="font-semibold text-slate-200">{item.t}：</span><span className="text-slate-500 font-light">{item.d}</span></div>
                    </div>
                  ))}
                </div>
              </div>
              <div className="bg-gradient-to-br from-slate-800 to-slate-900 border border-white/10 text-white p-10 rounded-[2rem] relative overflow-hidden group shadow-2xl">
                <Quote className="absolute -bottom-6 -right-6 text-orange-500/10 group-hover:text-orange-500/20 group-hover:scale-110 transition duration-700" size={180} strokeWidth={1} />
                <h3 className="text-2xl font-bold mb-8 relative z-10 text-white tracking-tight">不適合所有人</h3>
                <div className="space-y-5 relative z-10 text-base font-light text-slate-300 mb-10">
                  {[
                    { type: "X", t: "快速且確定會成功的方法" },
                    { type: "X", t: "一套照做就會贏的標準程序 (SOP)" },
                    { type: "X", t: "有人直接告訴你標準答案" },
                  ].map(item => (
                    <div key={item.t} className="flex items-center space-x-3">
                      <XCircle className="text-rose-400 shrink-0" size={20} />
                      <span className="text-slate-400">想要 <span className="text-slate-200 font-medium">{item.t}</span></span>
                    </div>
                  ))}
                </div>
                <div className="bg-orange-500/10 border border-orange-500/20 rounded-2xl p-4 relative z-10 backdrop-blur-sm">
                  <p className="text-orange-300 font-medium text-sm leading-relaxed">如果你卡住但講不清楚、缺資訊缺判斷框架...那這裡會對你有用。</p>
                </div>
              </div>
            </div>
          </section>

          {/* Profile Section (Placeholder) */}
          <section className="py-20 px-6 max-w-5xl mx-auto relative z-10">
            <div className="bg-slate-900/40 backdrop-blur-md border border-white/5 rounded-[2rem] p-10 md:p-14 shadow-2xl relative overflow-hidden group">
              <div className="absolute top-0 right-0 w-full h-full bg-gradient-to-l from-orange-500/5 to-transparent pointer-events-none"></div>
              <div className="flex flex-col items-center max-w-3xl mx-auto relative z-10">
                {/* Photo Placeholder */}
                <div className="flex justify-center relative mb-12">
                  <div className="absolute inset-0 bg-orange-500/10 blur-3xl rounded-full scale-110 group-hover:scale-125 transition-transform duration-700"></div>
                  <div className="w-56 h-56 md:w-72 md:h-72 rounded-full bg-slate-900/80 backdrop-blur-sm border-4 border-slate-800 shadow-2xl flex flex-col items-center justify-center group-hover:border-orange-500/30 transition-colors duration-500 overflow-hidden relative z-10">
                    <img src="https://lh3.googleusercontent.com/d/1CCyFkbZ1UTYiQzrXS6HdJtrfH_zV03vk" alt="Max 個人照" className="w-full h-full object-cover group-hover:scale-105 transition-transform duration-700" />
                  </div>
                </div>
                {/* Text Placeholder */}
                <div className="space-y-6 text-center w-full">
                  <h2 className="text-3xl font-bold text-white tracking-tight">我是 Max，生涯擺渡人</h2>
                  <div className="w-12 h-1 bg-orange-500/50 rounded-full mx-auto"></div>
                  <div className="text-slate-300 font-light leading-relaxed space-y-5 text-[15px] text-left mt-8 inline-block max-w-2xl px-4 md:px-0">
                    <p className="text-lg font-medium text-slate-200">從 2022 年起協助超過 300+ 職場人重新審視職涯與人生，始終相信每個人都能擁有專屬於自己的榮耀時刻！</p>
                    <p>有些人，是在一切都準備好之後才往前走；<br />也有一些人，是在還不確定的時候，選擇繼續相信。</p>
                    <p>白天，我在風險投資基金看趨勢、在天使投資俱樂部淘選創辦人，評估從太空到生活的各類項目；這些評估說來專業但其實無非就是「識人」的延伸 — 看一個人，能不能在混亂與不確定中，撐住自己想走的方向。</p>
                    <p>這些年，我看過很多聰明、努力、條件很好的人。<br />他們不是做不到，而是太早開始懷疑自己。</p>
                    <p>透過文字、對話與陪伴，去理解那些「看起來都很好，卻過得不太快樂」的時刻，也試著陪一個人，在現實裡找到繼續走下去的方式。</p>
                    <div className="bg-orange-500/10 border border-orange-500/20 p-5 rounded-xl relative group-hover:shadow-[0_0_20px_rgba(249,115,22,0.1)] transition-all duration-500">
                      <p className="font-semibold text-orange-400 mb-2">我做的事情很簡單——</p>
                      <p className="text-orange-200/90 text-[15px]">就是在你快要放棄選擇之前，陪你把最關鍵的那一步，再想清楚一點。</p>
                    </div>
                    <p className="pt-4 text-slate-500 font-medium text-center">我是 Max，我是在現實裡持續尋找理想的人。</p>
                  </div>
                </div>
              </div>
            </div>
          </section>
        </div>
      );

      // 2. 服務說明頁面
      const ServicesPage = () => (
        <div className="py-24 px-6 max-w-6xl mx-auto animate-in slide-in-from-bottom-8 duration-700 fade-in">
          <div className="text-center mb-20 relative">
            <div className="absolute top-1/2 left-1/2 -translate-x-1/2 -translate-y-1/2 w-[500px] h-[150px] bg-orange-500/10 blur-[100px] rounded-full point-events-none"></div>
            <h2 className="text-4xl font-extrabold text-white tracking-tight relative z-10 drop-shadow-lg mb-6">理性與溫暖並存的職涯支援</h2>
            <p className="text-slate-400 max-w-2xl mx-auto font-light leading-relaxed text-lg relative z-10">
              （您可以在這裡補充服務初衷。例如：為什麼您會設計這些服務？您的核心觀點是什麼？或者是您希望帶給每個來諮詢的人什麼樣的轉變與價值...）
            </p>
          </div>
          <div className="grid md:grid-cols-3 gap-8 items-stretch relative z-10">
            {/* S1: $99 */}
            <div className="border border-white/10 rounded-[2rem] p-8 flex flex-col group bg-slate-900/40 backdrop-blur-md hover:bg-slate-900/80 hover:border-orange-500/30 transition-all duration-500 shadow-xl hover:shadow-orange-500/10">
              <div className="mb-8"><span className="bg-white/5 text-slate-300 border border-white/10 px-4 py-1.5 rounded-full text-xs font-bold uppercase tracking-widest">Email 限時回覆</span></div>
              <h3 className="text-2xl font-bold text-white mb-4">正能量傳輸服務</h3>
              <p className="text-slate-400 text-sm mb-8 leading-relaxed font-light grow">
                有時候卡住，只是因為你撐太久了。幫你情緒整理成可理解脈絡，並提供一個立刻採取的小行動。快速修復「重新上線」。

              const approvedPosts = parsed.data

                  const appKey = Object.keys(row).find(k => k.toLowerCase().includes('approved') || k.includes('核准') || k.includes('上架') || k.includes('顯示')) || 'Approved';
                  const val = String(row[appKey] || '').trim().toLowerCase();
                  return val === 'true' || val === 'yes' || val === '是' || val === 'v' || val === 'y';

                .map((row, index) => {
                  const keys = Object.keys(row);
                  const titleKey = keys.find(k => k.toLowerCase().includes('title') || k.includes('標題')) || keys[1];
                  const coverKey = keys.find(k => k.toLowerCase().includes('image') || k.toLowerCase().includes('cover') || k.includes('縮圖') || k.includes('圖片') || k.includes('封面')) || keys[2];

                  const dateKey = keys.find(k => k.toLowerCase().includes('date') || k.includes('日期') || k.includes('時間')) || keys[0];

                    return url;
                  };

                    id: `bp-${index}`,

                    thumbnail: getImageUrl(row[coverKey]),
                    description: row[descKey] || '',
                    link: row[linkKey] || '#',
